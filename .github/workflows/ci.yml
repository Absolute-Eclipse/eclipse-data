name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install

      # Engine correctness — blocking. A regression here fails the build.
      - name: Unit tests
        run: npm test

      # The publish gate vs NASA/Espenak. Informational for now (residuals printed)
      # and goes green once the benchmark expected-values are filled; at that point
      # flip this into the data-publish workflow as a blocking step.
      - name: Validation gate (residuals)
        run: npm run validate
        continue-on-error: true
